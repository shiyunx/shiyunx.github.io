# Site settings
title: Your Awesome Site
email: your-email@example.com
description: >- # This description appears in your site's meta tags for search engines
  This is the official website for my portfolio and blog, powered by Jekyll and Minima.
baseurl: "" # The subpath of your site, e.g. /blog (leave empty for user/organization pages)
url: "https://shiyunx.github.io" # Corrected URL to match your GitHub Pages domain (assuming shiyunx.github.io)
twitter_username: your_twitter_handle # Optional: Your Twitter handle
github_username: yourusername # Optional: Your GitHub username

# Theme settings
theme: minima # <--- CORRECTED: Use this line, and make sure it's not indented like the lines above it
# remote_theme: "jekyll/minima@1e8a445" # <--- Remove or comment this line out completely

# Header pages for top navigation
header_pages:
  - about.md
  - projects.md
  - blog.md # Include this ONLY if you create a 'blog.md' file for a separate blog link

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:path/ # <--- CRITICALLY CORRECTED: Use the placeholder
   
