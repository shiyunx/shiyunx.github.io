# Site settings
title: shiyunx # Set your site title
email: your-email@example.com # Optional: Your email
description: >- # This description appears in your site's meta tags for search engines
  This is the official website for my portfolio and blog, powered by Jekyll and Minima.
baseurl: "" # <--- ADDED THIS BACK: The subpath of your site (leave empty for user/organization pages)
url: "https://shiyunx.github.io" # Your GitHub Pages domain
github_username: shiyunx # Your GitHub username

# Theme settings
theme: minima # <--- CORRECTED: Use this line for GitHub Pages
# remote_theme: jekyll/minima # <--- Remove or comment this line out completely

# Header pages for top navigation
header_pages:
  - about.md
  - projects.md
  - blog.md # Include this ONLY if you create a 'blog.md' file for a separate blog link

# Layout settings
show_excerpts: true # This is good for showing post excerpts on listing pages

# Build settings
markdown: kramdown
plugins: # <--- ADDED THIS SECTION BACK
  - jekyll-seo-tag # <--- ADDED THIS BACK (good for SEO)
  # - jekyll-feed # If you removed this to hide RSS, keep it commented/removed

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:path/ # Correct for individual project URLs
